ctx {
  dataSourceClassName = "org.postgresql.ds.PGSimpleDataSource"
  # Hikari: evitar reutilizar conexiones que la red/DB ya cerró
  minimumIdle = 2
  maximumPoolSize = 10
  connectionTimeout = 10000
  validationTimeout = 5000
  idleTimeout = 120000
  maxLifetime = 240000
  keepaliveTime = 60000

  dataSource {
    # Soporta configuración separada por variables de entorno
    user = ${DATABASE_USER}
    password = ${DATABASE_PASSWORD}
    databaseName = ${DATABASE_NAME}
    portNumber = ${DATABASE_PORT}
    serverName = ${DATABASE_HOST}
  }
}
